<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="PowerGraph je browser-only fitness aplikacija zgrajena z Reactom in Vite."
    />
    <title>PowerGraph</title>
    <link rel="manifest" href="/PowerGraph/manifest.json" />
    <link rel="icon" href="/PowerGraph/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/PowerGraph/icon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PowerGraph" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/PowerGraph/sw.js', { updateViaCache: 'none' });
        // The SW posts SW_UPDATED when a new version activates.
        // App.jsx listens and shows a toast before reloading.
        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data?.type === 'SW_UPDATED') {
            window.__swUpdated = true;
            window.dispatchEvent(new CustomEvent('sw-updated'));
          }
        });
      }
    </script>
  </body>
</html>
