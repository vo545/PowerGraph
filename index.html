<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGraph | Sledenje fitnes napredku</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="PowerGraph je premium aplikacija za sledenje fitnes napredku, beleženje treningov in prikaz vizualne statistike.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <i class="ph ph-chart-line-up logo-icon"></i>
                <h1>Power<span class="highlight">Graph</span></h1>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-btn active" id="nav-dashboard">
                    <i class="ph ph-squares-four"></i> Nadzorna plošča
                </button>
                <button class="nav-btn" id="nav-history">
                    <i class="ph ph-clock-counter-clockwise"></i> Zgodovina
                </button>
                <button class="nav-btn" id="nav-goals">
                    <i class="ph ph-target"></i> Cilji
                </button>
                <button class="nav-btn" id="nav-settings">
                    <i class="ph ph-gear"></i> Nastavitve
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="action-btn-outline" id="btn-export">
                    <i class="ph ph-export"></i> Izvozi podatke
                </button>
                <button class="action-btn-outline" id="btn-sync" title="Opcijsko">
                    <i class="ph ph-cloud-arrow-up"></i> Sinhroniziraj
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Topbar / Header -->
            <header class="topbar">
                <div class="greeting">
                    <h2>Dobrodošli nazaj, Trdoživec! 💪</h2>
                    <p>Začnimo s podiranjem novih osebnih rekordov.</p>
                </div>
                <div class="user-actions">
                    <button class="theme-toggle" id="theme-toggle" title="Preklopi temo">
                        <i class="ph ph-moon"></i>
                    </button>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Power+Graph&background=1976d2&color=fff&rounded=true" alt="User Avatar">
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-grid">
                
                <!-- Stat Cards Row -->
                <div class="stat-card glass-panel fade-in-up" style="animation-delay: 0.1s;">
                    <div class="stat-icon blue-glow">
                        <i class="ph ph-barbell"></i>
                    </div>
                    <div class="stat-details">
                        <p class="stat-title">Skupna teža (Teden)</p>
                        <h3 class="stat-value" id="stat-volume">12,450 <span class="unit">kg</span></h3>
                    </div>
                </div>

                <div class="stat-card glass-panel fade-in-up" style="animation-delay: 0.2s;">
                    <div class="stat-icon green-glow">
                        <i class="ph ph-trend-up"></i>
                    </div>
                    <div class="stat-details">
                        <p class="stat-title">Osebni rekordi</p>
                        <h3 class="stat-value" id="stat-prs">4 <span class="unit">ta mesec</span></h3>
                    </div>
                </div>

                <div class="stat-card glass-panel fade-in-up" style="animation-delay: 0.3s;">
                    <div class="stat-icon purple-glow">
                        <i class="ph ph-fire"></i>
                    </div>
                    <div class="stat-details">
                        <p class="stat-title">Niz treningov</p>
                        <h3 class="stat-value" id="stat-streak">3 <span class="unit">dni</span></h3>
                    </div>
                </div>

                <!-- Main Chart Panel -->
                <div class="chart-panel glass-panel fade-in-up" style="animation-delay: 0.4s;">
                    <div class="panel-header">
                        <h3>Napredek (Vrhunska obremenitev)</h3>
                        <select id="chart-machine-select" class="premium-select">
                            <option value="Bench Press">Bench Press</option>
                            <option value="Squat">Squat</option>
                            <option value="Deadlift">Deadlift</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>

                <!-- Action Panel (Add Workout) -->
                <div class="action-panel glass-panel fade-in-up" style="animation-delay: 0.5s;">
                    <div class="panel-header">
                        <h3>Hitri vnos treninga</h3>
                    </div>
                    <form id="workout-form" class="premium-form">
                        <div class="form-row">
                            <div class="input-group">
                                <label for="machine">Vaja / Naprava</label>
                                <input type="text" id="machine" placeholder="Npr. Bench Press" required>
                            </div>
                            <div class="input-group">
                                <label for="date">Datum</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>

                        <div class="form-row triple">
                            <div class="input-group">
                                <label for="weight">Teža (kg)</label>
                                <input type="number" id="weight" step="0.5" placeholder="80" required>
                            </div>
                            <div class="input-group">
                                <label for="sets">Serije</label>
                                <input type="number" id="sets" placeholder="4" required>
                            </div>
                            <div class="input-group">
                                <label for="reps">Ponovitve</label>
                                <input type="number" id="reps" placeholder="10" required>
                            </div>
                        </div>

                        <button type="submit" class="action-btn-primary full-width mt-1">
                            <i class="ph ph-plus-circle"></i> Dodaj vajo
                        </button>
                    </form>
                </div>
            </div>
            
        </main>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
