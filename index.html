<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="PowerGraph is a local-first fitness PWA for workouts, calories, body weight, hydration, rankings, and optional backend sync."
    />
    <title>PowerGraph</title>
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PowerGraph" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        function notifyUpdate(registration) {
          window.__swRegistration = registration;
          window.__swUpdated = true;
          window.dispatchEvent(new CustomEvent('sw-updated'));
        }

        navigator.serviceWorker.register('%BASE_URL%sw.js', { updateViaCache: 'none' }).then((registration) => {
          window.__swRegistration = registration;
          if (registration.waiting && navigator.serviceWorker.controller) notifyUpdate(registration);
          registration.addEventListener('updatefound', () => {
            const worker = registration.installing;
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                notifyUpdate(registration);
              }
            });
          });
        });

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (window.__powerGraphUpdating) window.location.reload();
        });

        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data?.type === 'SW_UPDATED') {
            notifyUpdate(window.__swRegistration);
          }
        });
      }
    </script>
  </body>
</html>
